server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Обслуживание фронта
    location / {
        try_files $uri /index.html;
    }

    # Проксирование всех API-запросов на внешний бэкенд
    location /api/ {
        proxy_pass http://92.242.60.110:8000/;   # Внешний IP бэка, слеш обязателен
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты для долгих запросов
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;

        # Буферы для больших ответов
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        # Максимальный размер тела запроса (POST/PATCH)
        client_max_body_size 10M;
    }
}
